<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b1f3a" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#f3f4f8" media="(prefers-color-scheme: light)" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>التقويم الهجري</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-512.png" />
<style>
  :root{
    --bg:#f3f4f8; --bg2:#eceef4; --surface:#ffffff; --surface2:#f7f8fb;
    --ink:#16181d; --ink2:#5b6068; --ink3:#9aa0aa; --line:#e6e8ef;
    --accent:#0a71ba; --accent-soft:#e4f0fb; --accent-ink:#0a71ba;
    --today:#0a71ba; --weekend:#fff7e0; --weekend-ink:#a9791b;
    --nat:#8e1d2c; --nat-soft:#fbe7ea;
    --fest:#1b8a6b; --fest-soft:#e3f4ee;
    --pay:#475569; --pay-soft:#eef1f6;
    --user:#7c4dff; --user-soft:#efeaff;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 8px 24px rgba(16,24,40,.06);
    --r-card:30px; --r-cell:18px; --r-pill:999px;
    --ff:'SamsungOne Arabic','One UI Sans','SamsungOneUI','Noto Sans Arabic','Geeza Pro','Segoe UI',system-ui,sans-serif;
    --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
  }
  @media (prefers-color-scheme: dark){
    html:not([data-theme]){
      --bg:#0b0d12; --bg2:#0f131a; --surface:#161a22; --surface2:#1b2029;
      --ink:#eef1f6; --ink2:#a4abb8; --ink3:#6b7280; --line:#242a35;
      --accent:#3d97e6; --accent-soft:#13283b; --accent-ink:#7fc0f5;
      --today:#0a71ba; --weekend:#211c10; --weekend-ink:#e0bd66;
      --nat:#e2697a; --nat-soft:#2a1419; --fest:#5fc8a6; --fest-soft:#0f241d;
      --pay:#9aa3b2; --pay-soft:#1c222c;
      --user:#b39dff; --user-soft:#1e1733;
      --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.45);
    }
  }
  html[data-theme="light"]{color-scheme:light;}
  html[data-theme="dark"]{color-scheme:dark;
      --bg:#0b0d12;--bg2:#0f131a;--surface:#161a22;--surface2:#1b2029;--ink:#eef1f6;--ink2:#a4abb8;--ink3:#6b7280;--line:#242a35;--accent:#3d97e6;--accent-soft:#13283b;--accent-ink:#7fc0f5;--weekend:#211c10;--weekend-ink:#e0bd66;--nat:#e2697a;--nat-soft:#2a1419;--fest:#5fc8a6;--fest-soft:#0f241d;--pay:#9aa3b2;--pay-soft:#1c222c;--user:#b39dff;--user-soft:#1e1733;--shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.45);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:var(--ff);background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;overflow-x:hidden;user-select:none;}
  .app{max-width:560px;margin:0 auto;min-height:100vh;min-height:100dvh;
    padding:var(--safe-t) 14px calc(24px + var(--safe-b));}

  /* One UI large title header */
  header{padding:18px 6px 4px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;height:40px;}
  .topbar .app-name{font-size:15px;font-weight:600;color:var(--ink2);}
  .icon-btn{width:42px;height:42px;border:none;border-radius:var(--r-pill);
    background:transparent;color:var(--ink);font-size:20px;display:grid;place-items:center;
    cursor:pointer;transition:background .15s;}
  .icon-btn:active{background:var(--bg2);}
  .bigtitle{font-size:34px;font-weight:700;letter-spacing:-.5px;margin:10px 4px 0;line-height:1.15;}
  .subtitle{font-size:14.5px;color:var(--ink2);margin:4px 4px 0;font-weight:400;}
  .season{display:inline-flex;align-items:center;gap:6px;margin:10px 4px 0;
    background:var(--surface);box-shadow:var(--shadow);padding:7px 13px;border-radius:var(--r-pill);
    font-size:12.5px;color:var(--ink2);font-weight:500;}
  .season b{color:var(--ink);font-weight:600;}

  /* month nav */
  .nav{display:flex;align-items:center;justify-content:space-between;margin:16px 2px 10px;}
  .nav .mlabel{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px;cursor:pointer;}
  .nav .mlabel .chev{font-size:13px;color:var(--ink3);}
  .nav-actions{display:flex;gap:6px;align-items:center;}
  .today-chip{border:1px solid var(--line);background:var(--surface);color:var(--accent-ink);
    font-family:var(--ff);font-size:13px;font-weight:600;padding:8px 14px;border-radius:var(--r-pill);
    cursor:pointer;transition:.15s;}
  .today-chip:active{background:var(--accent-soft);}

  /* calendar card */
  .cal{background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow);
    padding:14px 12px 16px;overflow:hidden;touch-action:pan-y;}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px;}
  .dow span{text-align:center;font-size:11.5px;font-weight:600;color:var(--ink3);padding:6px 0;}
  .dow span.we{color:var(--weekend-ink);}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
  .cell{position:relative;aspect-ratio:1/1.08;border-radius:var(--r-cell);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;transition:background .12s,transform .08s;background:transparent;}
  .cell.empty{pointer-events:none;}
  .cell.we{background:var(--weekend);}
  .cell:active{transform:scale(.93);}
  .cell .hd{font-size:17px;font-weight:600;color:var(--ink);line-height:1;}
  .cell .gd{font-size:10px;color:var(--ink3);margin-top:3px;font-weight:400;}
  .cell.we .gd{color:var(--weekend-ink);}
  .cell .dots{position:absolute;bottom:6px;display:flex;gap:2.5px;}
  .dot{width:5px;height:5px;border-radius:50%;}
  .dot.f{background:var(--fest);} .dot.n{background:var(--nat);} .dot.p{background:var(--pay);} .dot.u{background:var(--user);}
  .cell.today{background:var(--today);}
  .cell.today .hd,.cell.today .gd{color:#fff;}
  .cell.today .dot{box-shadow:0 0 0 1.5px var(--today);}
  .cell.today.we{background:var(--today);}
  .cell.sel{outline:2px solid var(--accent);outline-offset:-2px;}

  /* events list */
  .sec-h{font-size:14px;font-weight:600;color:var(--ink2);margin:22px 6px 10px;}
  .ev{display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:22px;
    padding:13px 15px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;transition:transform .08s;}
  .ev:active{transform:scale(.985);}
  .ev .badge{min-width:50px;text-align:center;border-radius:14px;padding:7px 4px;}
  .ev .badge .d{font-size:18px;font-weight:700;line-height:1;}
  .ev .badge .mo{font-size:10px;margin-top:2px;opacity:.85;}
  .ev .badge.f{background:var(--fest-soft);color:var(--fest);}
  .ev .badge.n{background:var(--nat-soft);color:var(--nat);}
  .ev .badge.p{background:var(--pay-soft);color:var(--pay);}
  .ev .badge.u{background:var(--user-soft);color:var(--user);}
  .ev .meta .t{font-size:15px;font-weight:600;}
  .ev .meta .s{font-size:12.5px;color:var(--ink2);margin-top:2px;}
  .empty-ev{color:var(--ink3);font-size:13.5px;text-align:center;padding:16px;}

  /* bottom sheet */
  .scrim{position:fixed;inset:0;background:rgba(8,12,20,.45);backdrop-filter:blur(2px);
    opacity:0;pointer-events:none;transition:opacity .25s;z-index:40;}
  .scrim.on{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--surface);
    border-radius:30px 30px 0 0;padding:calc(10px + var(--safe-t)) 20px calc(26px + var(--safe-b));
    transform:translateY(110%);transition:transform .32s cubic-bezier(.22,1,.36,1);
    max-width:600px;margin:0 auto;box-shadow:0 -10px 40px rgba(0,0,0,.25);
    max-height:92vh;max-height:calc(100dvh - 8px);overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
  .sheet.on{transform:translateY(0);}
  .grab{width:38px;height:5px;border-radius:3px;background:var(--line);margin:6px auto 16px;}
  .sheet h3{margin:0;font-size:22px;font-weight:700;}
  .sheet .greg{color:var(--ink2);font-size:14.5px;margin-top:4px;}
  .sheet .row{display:flex;justify-content:space-between;align-items:center;
    padding:14px 0;border-top:1px solid var(--line);font-size:14.5px;}
  .sheet .row .k{color:var(--ink2);} .sheet .row .v{font-weight:600;}
  .tag{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:var(--r-pill);
    font-size:13px;font-weight:600;margin:4px 6px 0 0;}
  .tag.f{background:var(--fest-soft);color:var(--fest);}
  .tag.n{background:var(--nat-soft);color:var(--nat);}
  .tag.p{background:var(--pay-soft);color:var(--pay);}
  .tag.w{background:var(--weekend);color:var(--weekend-ink);}
  .tag.u{background:var(--user-soft);color:var(--user);}
  .linkbtn{margin-top:12px;background:none;border:none;color:var(--accent-ink);font-family:var(--ff);
    font-size:14px;font-weight:600;cursor:pointer;padding:4px 0;}
  .addrow{display:none;gap:8px;margin-top:10px;}
  .addrow input{flex:1;border:1px solid var(--line);background:var(--surface2);color:var(--ink);
    font-family:var(--ff);font-size:15px;padding:13px 14px;border-radius:14px;outline:none;}
  .addrow input:focus{border-color:var(--accent);}
  .addrow .btn{flex:0 0 auto;padding:13px 20px;}
  .del{background:var(--bg2);border:none;color:var(--ink2);width:34px;height:34px;border-radius:50%;
    font-size:14px;cursor:pointer;flex:0 0 auto;}
  .del:active{background:var(--nat-soft);color:var(--nat);}
  .toast{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:calc(28px + var(--safe-b));
    background:var(--ink);color:var(--bg);padding:12px 20px;border-radius:var(--r-pill);font-size:13.5px;font-weight:600;
    z-index:60;opacity:0;pointer-events:none;transition:.25s;max-width:90%;text-align:center;}
  .toast.show{opacity:.96;transform:translateX(-50%) translateY(0);}
  .search-input{width:100%;border:1px solid var(--line);background:var(--surface2);color:var(--ink);
    font-family:var(--ff);font-size:16px;padding:14px 16px;border-radius:16px;outline:none;}
  .search-input:focus{border-color:var(--accent);}
  .lf-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid var(--line);}
  .lf-row:first-of-type{border-top:none;}
  .lf-k{width:46px;font-size:14px;color:var(--ink2);font-weight:600;}
  .lf-date{flex:1;border:1px solid var(--line);background:var(--surface2);color:var(--ink);
    font-family:var(--ff);font-size:15px;padding:11px 13px;border-radius:13px;outline:none;}
  .lf-date:focus{border-color:var(--accent);}
  .lf-colors{display:flex;gap:10px;}
  .lf-colors button{width:30px;height:30px;border-radius:50%;border:2px solid transparent;cursor:pointer;}
  .lf-colors button.on{border-color:var(--ink);}
  .sheet-actions{display:flex;gap:10px;margin-top:20px;}
  .btn{flex:1;border:none;border-radius:16px;padding:15px;font-family:var(--ff);font-size:15px;
    font-weight:600;cursor:pointer;transition:.15s;}
  .btn.primary{background:var(--accent);color:#fff;}
  .btn.primary:active{filter:brightness(.92);}
  .btn.ghost{background:var(--bg2);color:var(--ink);}

  /* settings rows */
  .set-row{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-top:1px solid var(--line);}
  .set-row:first-of-type{border-top:none;}
  .set-row .lab{font-size:15px;font-weight:500;}
  .set-row .sub{font-size:12px;color:var(--ink3);margin-top:2px;}
  .switch{position:relative;width:50px;height:30px;flex:0 0 auto;}
  .switch input{display:none;}
  .switch .track{position:absolute;inset:0;background:var(--line);border-radius:var(--r-pill);transition:.2s;cursor:pointer;}
  .switch .knob{position:absolute;top:3px;right:3px;width:24px;height:24px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .switch input:checked + .track{background:var(--accent);}
  .switch input:checked + .track .knob{right:23px;}
  .seg{display:flex;background:var(--bg2);border-radius:var(--r-pill);padding:3px;gap:2px;}
  .seg button{border:none;background:transparent;font-family:var(--ff);font-size:13px;font-weight:600;
    color:var(--ink2);padding:8px 14px;border-radius:var(--r-pill);cursor:pointer;}
  .seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow);}

  /* year view */
  .ref-seg-wrap{display:flex;justify-content:center;margin:16px 2px 2px;}
  .ref-seg{width:100%;max-width:320px;}
  .ref-seg button{flex:1;padding:10px 14px;font-size:14px;}
  #yearGrid{touch-action:pan-y;}
  .mini-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  /* annual overview matrix */
  .ov-seg{display:flex;gap:2px;background:var(--bg2);border-radius:var(--r-pill);padding:3px;width:max-content;margin:0 auto 12px;}
  .ov-seg button{border:none;background:transparent;font-family:var(--ff);font-size:13px;font-weight:600;color:var(--ink2);padding:7px 18px;border-radius:var(--r-pill);cursor:pointer;}
  .ov-seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow);}
  .ov-wrap{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow);padding:8px 0 10px;}
  .ov{display:grid;direction:rtl;width:100%;}
  .ov>div{box-sizing:border-box;}
  .ov .corner{position:sticky;right:0;top:0;z-index:6;background:var(--surface);}
  .ov .hd{position:sticky;top:0;z-index:2;background:var(--surface);font-size:8.5px;color:var(--ink3);text-align:center;height:17px;line-height:17px;}
  .ov .hd.we{color:var(--weekend-ink);}
  .ov .mlab{position:sticky;right:0;z-index:3;background:var(--surface);font-size:10.5px;font-weight:600;color:var(--ink);padding:0 7px;display:flex;align-items:center;white-space:nowrap;border-top:1px solid var(--line);}
  .ov .oc{height:44px;border-top:1px solid var(--line);border-right:1px solid var(--line);border-bottom:3px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:3px;position:relative;cursor:pointer;}
  .ov .oc .n{font-size:11px;font-weight:700;color:var(--ink);line-height:1.05;}
  .ov .oc .g{font-size:7px;color:var(--ink3);line-height:1;margin-top:1px;}
  .ov .oc.we .n{color:var(--weekend-ink);}
  .ov .oc.full .n,.ov .oc.full .g{color:#fff;}
  .ov .oc .mbox{margin-top:auto;margin-bottom:3px;width:15px;height:7px;border-radius:2px;border:1px solid rgba(120,130,150,.45);background:transparent;}
  .ov .oc.full .mbox{border-color:rgba(255,255,255,.5);}
  .ov .oc .mbox.filled{border-color:transparent;}
  .ov .oc.today{outline:2px solid var(--accent);outline-offset:-2px;border-radius:5px;}
  .ov-legend{display:flex;flex-wrap:wrap;gap:8px 12px;margin:12px 6px 0;}
  .ov-legend .lg i{width:11px;height:11px;border-radius:3px;}
  .ov-legend .lg i.line{height:4px;width:16px;border-radius:2px;}
  .num-input{width:62px;border:1px solid var(--line);background:var(--surface2);color:var(--ink);font-family:var(--ff);font-size:16px;font-weight:600;text-align:center;padding:9px 6px;border-radius:12px;outline:none;-moz-appearance:textfield;}
  .num-input::-webkit-outer-spin-button,.num-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .num-input:focus{border-color:var(--accent);}
  .sel-input{border:1px solid var(--line);background:var(--surface2);color:var(--ink);font-family:var(--ff);font-size:14px;font-weight:600;padding:9px 10px;border-radius:12px;outline:none;max-width:160px;}
  .sel-input:focus{border-color:var(--accent);}
  .ds-prayer{margin-top:14px;background:var(--surface2);border:1px solid var(--line);border-radius:16px;padding:12px;}
  .ds-prayer .dp-h{font-size:13px;font-weight:700;color:var(--accent-ink);margin-bottom:10px;}
  .ds-prayer .dp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .ds-prayer .dp-cell{display:flex;flex-direction:column;align-items:center;gap:3px;background:var(--surface);border-radius:12px;padding:9px 4px;}
  .ds-prayer .dp-n{font-size:11px;color:var(--ink3);}
  .ds-prayer .dp-t{font-size:14px;font-weight:700;color:var(--ink);}
  .tc-pray{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;}
  .tc-pray .tp-next{font-size:12.5px;font-weight:700;color:var(--accent-ink);margin-bottom:8px;}
  .tc-pray .tp-row{display:flex;gap:6px;overflow-x:auto;}
  .tc-pray .tp-cell{flex:1;min-width:46px;display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--surface2);border-radius:10px;padding:6px 3px;}
  .tc-pray .tp-cell.on{background:var(--accent);}
  .tc-pray .tp-cell.on .tp-n,.tc-pray .tp-cell.on .tp-t{color:#fff;}
  .tc-pray .tp-n{font-size:10px;color:var(--ink3);white-space:nowrap;}
  .tc-pray .tp-t{font-size:11.5px;font-weight:700;color:var(--ink);white-space:nowrap;}
  .daycount{display:inline-block;margin-top:3px;font-size:11px;font-weight:600;color:var(--accent-ink);background:var(--accent-soft);padding:2px 9px;border-radius:var(--r-pill);}
  .daycount.past{color:var(--ink3);background:var(--bg2);}
  .daycount.today{color:#fff;background:var(--accent);}
  /* Today summary card */
  .today-card{background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow);padding:13px 16px;margin:10px 0 2px;display:flex;flex-direction:column;gap:9px;border:1px solid var(--line);cursor:pointer;}
  .today-card .tc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .today-card .tc-h{font-size:18px;font-weight:800;color:var(--ink);line-height:1.2;}
  .today-card .tc-g{font-size:12.5px;color:var(--ink2);margin-top:3px;}
  .today-card .tc-season{font-size:11.5px;font-weight:700;padding:4px 11px;border-radius:var(--r-pill);white-space:nowrap;}
  .today-card .tc-next{display:flex;align-items:center;gap:9px;border-top:1px dashed var(--line);padding-top:9px;}
  .today-card .tc-next .nx-dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .today-card .tc-next .nx-l{font-size:13.5px;font-weight:700;color:var(--ink);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .today-card .tc-next .nx-c{font-size:11.5px;font-weight:700;color:var(--accent-ink);background:var(--accent-soft);padding:3px 10px;border-radius:var(--r-pill);white-space:nowrap;flex:none;}
  /* Day note + color marks */
  .note-area{width:100%;box-sizing:border-box;min-height:64px;border:1px solid var(--line);background:var(--surface2);color:var(--ink);font-family:var(--ff);font-size:14.5px;line-height:1.6;padding:11px 13px;border-radius:14px;outline:none;resize:vertical;margin-top:4px;}
  .note-area:focus{border-color:var(--accent);}
  .ds-note-lab{font-size:13px;font-weight:700;color:var(--ink2);margin-top:14px;display:flex;align-items:center;gap:6px;}
  .mark-colors{display:flex;gap:9px;margin:8px 0 2px;}
  .mark-colors button{width:27px;height:27px;border-radius:50%;border:2px solid transparent;cursor:pointer;}
  .mark-colors button.on{border-color:var(--ink);transform:scale(1.08);}
  /* Converter sheet */
  .conv-pane{display:none;} .conv-pane.on{display:block;}
  .conv-block{background:var(--surface2);border-radius:16px;padding:13px 14px;margin-top:12px;}
  .conv-block .cb-h{font-size:13.5px;font-weight:700;color:var(--ink2);margin-bottom:9px;}
  .conv-row{display:flex;align-items:center;gap:8px;}
  .conv-date{flex:1;border:1px solid var(--line);background:var(--surface);color:var(--ink);font-family:var(--ff);font-size:15px;padding:10px 12px;border-radius:12px;outline:none;}
  .conv-date:focus{border-color:var(--accent);}
  .conv-sel{border:1px solid var(--line);background:var(--surface);color:var(--ink);font-family:var(--ff);font-size:15px;padding:10px 8px;border-radius:12px;outline:none;}
